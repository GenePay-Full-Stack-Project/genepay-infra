apiVersion: apps/v1
kind: Deployment
metadata:
  name: biometric-service
  namespace: genepay
spec:
  replicas: 1
  selector:
    matchLabels:
      app: biometric-service
  template:
    metadata:
      labels:
        app: biometric-service
    spec:
      containers:
        - name: biometric-service
          image: udarawick/genepay-biometric-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8001
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          env:
            - name: APP_NAME
              value: GenePay Biometric Service
            - name: APP_VERSION
              value: 1.0.0
            - name: APP_ENV
              valueFrom:
                configMapKeyRef:
                  name: genepay-config
                  key: APP_ENV
            - name: DEBUG
              valueFrom:
                configMapKeyRef:
                  name: genepay-config
                  key: BIOMETRIC_DEBUG
            - name: PORT
              value: "8001"
            - name: MONGODB_URL
              valueFrom:
                secretKeyRef:
                  name: genepay-secrets
                  key: MONGO_URL
            - name: MONGODB_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: genepay-config
                  key: MONGO_DATABASE
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: genepay-secrets
                  key: JWT_SECRET_KEY
            - name: JWT_ALGORITHM
              valueFrom:
                configMapKeyRef:
                  name: genepay-config
                  key: JWT_ALGORITHM
            - name: ACCESS_TOKEN_EXPIRE_MINUTES
              valueFrom:
                configMapKeyRef:
                  name: genepay-config
                  key: ACCESS_TOKEN_EXPIRE_MINUTES
            - name: FACE_RECOGNITION_TOLERANCE
              valueFrom:
                configMapKeyRef:
                  name: genepay-config
                  key: FACE_RECOGNITION_TOLERANCE
            - name: FACE_ENCODING_MODEL
              valueFrom:
                configMapKeyRef:
                  name: genepay-config
                  key: FACE_ENCODING_MODEL
            - name: MIN_FACE_SIZE
              valueFrom:
                configMapKeyRef:
                  name: genepay-config
                  key: MIN_FACE_SIZE
            - name: LIVENESS_THRESHOLD
              valueFrom:
                configMapKeyRef:
                  name: genepay-config
                  key: LIVENESS_THRESHOLD
            - name: ENABLE_LIVENESS_DETECTION
              valueFrom:
                configMapKeyRef:
                  name: genepay-config
                  key: ENABLE_LIVENESS_DETECTION
            - name: LIVENESS_MIN_SHARPNESS
              valueFrom:
                configMapKeyRef:
                  name: genepay-config
                  key: LIVENESS_MIN_SHARPNESS
            - name: LIVENESS_MIN_BRIGHTNESS
              valueFrom:
                configMapKeyRef:
                  name: genepay-config
                  key: LIVENESS_MIN_BRIGHTNESS
            - name: LIVENESS_MAX_BRIGHTNESS
              valueFrom:
                configMapKeyRef:
                  name: genepay-config
                  key: LIVENESS_MAX_BRIGHTNESS
            - name: PAYMENT_SERVICE_URL
              value: http://payment-service:8080
            - name: API_GATEWAY_URL
              valueFrom:
                configMapKeyRef:
                  name: genepay-config
                  key: API_GATEWAY_URL
            - name: MAX_IMAGE_SIZE_MB
              valueFrom:
                configMapKeyRef:
                  name: genepay-config
                  key: MAX_IMAGE_SIZE_MB
            - name: CORS_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: genepay-config
                  key: BIOMETRIC_CORS_ORIGINS
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: genepay-config
                  key: LOG_LEVEL
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 60
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: biometric-service
  namespace: genepay
spec:
  selector:
    app: biometric-service
  ports:
    - name: http
      port: 8001
      targetPort: 8001
  type: ClusterIP
