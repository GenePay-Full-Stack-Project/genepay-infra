apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-dashboard
  namespace: genepay
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin-dashboard
  template:
    metadata:
      labels:
        app: admin-dashboard
    spec:
      containers:
        - name: admin-dashboard
          image: udarawick/genepay-admin-dashboard:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          env:
            - name: VITE_API_BASE
              valueFrom:
                configMapKeyRef:
                  name: genepay-config
                  key: ADMIN_VITE_API_BASE
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: admin-dashboard
  namespace: genepay
spec:
  selector:
    app: admin-dashboard
  ports:
    - name: http
      port: 80
      targetPort: 80
  type: ClusterIP
