apiVersion: apps/v1
kind: Deployment
metadata:
  name: blockchain-relay
  namespace: genepay
spec:
  replicas: 1
  selector:
    matchLabels:
      app: blockchain-relay
  template:
    metadata:
      labels:
        app: blockchain-relay
    spec:
      containers:
        - name: blockchain-relay
          image: udarawick/genepay-blockchain-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          env:
            - name: SEPOLIA_RPC_URL
              valueFrom:
                secretKeyRef:
                  name: genepay-secrets
                  key: SEPOLIA_RPC_URL
            - name: PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: genepay-secrets
                  key: PRIVATE_KEY
            - name: CONTRACT_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: genepay-secrets
                  key: CONTRACT_ADDRESS
            - name: NETWORK
              valueFrom:
                configMapKeyRef:
                  name: genepay-config
                  key: BLOCKCHAIN_NETWORK
            - name: ETHERSCAN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: genepay-secrets
                  key: ETHERSCAN_API_KEY
            - name: RELAY_PORT
              value: "3001"
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: blockchain-relay
  namespace: genepay
spec:
  selector:
    app: blockchain-relay
  ports:
    - name: http
      port: 3001
      targetPort: 3001
  type: ClusterIP
