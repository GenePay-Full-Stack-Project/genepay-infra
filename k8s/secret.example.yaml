apiVersion: v1
kind: Secret
metadata:
  name: genepay-secrets
  namespace: genepay
type: Opaque
stringData:
  # PostgreSQL
  DB_PASSWORD: genepay_db

  # Shared JWT
  JWT_SECRET_KEY: change_me_to_a_long_random_secret_key_min_32_chars

  # MongoDB (biometric service)
  MONGO_URL: your_mongo_url


  # Blockchain relay
  PRIVATE_KEY: your_wallet_private_key_without_0x_prefix
  ETHERSCAN_API_KEY: your_etherscan_api_key

  # Payment service
  MAIL_USERNAME: your_email@gmail.com
  MAIL_PASSWORD: your_email_password
  BIOPAY_PLATFORM_TOKEN: your_biopay_platform_token
  GOOGLE_CLIENT_ID: your_google_oauth2_client_id
  GOOGLE_CLIENT_SECRET: your_google_oauth2_client_secret