version: "3.8"

# =============================================================================
# GenePay Platform - Full Stack Docker Compose
# Services: MongoDB, PostgreSQL, Biometric, Blockchain Relay, Payment,
#           Admin Dashboard, Blockchain Dashboard
# Usage: docker compose --env-file .env up -d
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Infrastructure: PostgreSQL (Payment Service)
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: genepay-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 5
    networks:
      - genepay-network

  # ---------------------------------------------------------------------------
  # Backend: Biometric Service (Python / FastAPI) — port 8001
  # ---------------------------------------------------------------------------
  biometric-service:
    build:
      context: ../../../modules/genepay-biometric-service
      dockerfile: Dockerfile
    container_name: genepay-biometric-service
    restart: unless-stopped
    environment:
      # Application
      APP_NAME: ${BIOMETRIC_APP_NAME:-GenePay Biometric Service}
      APP_VERSION: ${BIOMETRIC_APP_VERSION:-1.0.0}
      APP_ENV: ${APP_ENV:-production}
      DEBUG: ${BIOMETRIC_DEBUG:-False}
      PORT: 8001

      # MongoDB
      MONGODB_URL: ${MONGO_URL}
      MONGODB_DATABASE: ${MONGO_DATABASE}

      # JWT (inter-service)
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}

      # Face Recognition
      FACE_RECOGNITION_TOLERANCE: ${FACE_RECOGNITION_TOLERANCE:-0.6}
      FACE_ENCODING_MODEL: ${FACE_ENCODING_MODEL:-large}
      MIN_FACE_SIZE: ${MIN_FACE_SIZE:-100}

      # Liveness Detection
      LIVENESS_THRESHOLD: ${LIVENESS_THRESHOLD:-0.7}
      ENABLE_LIVENESS_DETECTION: ${ENABLE_LIVENESS_DETECTION:-False}
      LIVENESS_MIN_SHARPNESS: ${LIVENESS_MIN_SHARPNESS:-50.0}
      LIVENESS_MIN_BRIGHTNESS: ${LIVENESS_MIN_BRIGHTNESS:-40.0}
      LIVENESS_MAX_BRIGHTNESS: ${LIVENESS_MAX_BRIGHTNESS:-220.0}

      # Inter-service URLs
      PAYMENT_SERVICE_URL: http://payment-service:8080
      API_GATEWAY_URL: ${API_GATEWAY_URL:-http://localhost:80}

      # Image Processing
      MAX_IMAGE_SIZE_MB: ${MAX_IMAGE_SIZE_MB:-5}

      # Security
      CORS_ORIGINS: ${BIOMETRIC_CORS_ORIGINS:-*}

      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-WARNING}
    ports:
      - "8001:8001"
    networks:
      - genepay-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  # ---------------------------------------------------------------------------
  # Backend: Blockchain Relay Service (Node.js) — port 3001
  # ---------------------------------------------------------------------------
  blockchain-relay:
    build:
      context: ../../../modules/genepay-blockchain-service/relay
      dockerfile: Dockerfile
    container_name: genepay-blockchain-relay
    restart: unless-stopped
    environment:
      # Ethereum Network
      SEPOLIA_RPC_URL: ${SEPOLIA_RPC_URL}
      PRIVATE_KEY: ${PRIVATE_KEY}
      CONTRACT_ADDRESS: ${CONTRACT_ADDRESS}
      NETWORK: ${BLOCKCHAIN_NETWORK:-sepolia}

      # Etherscan
      ETHERSCAN_API_KEY: ${ETHERSCAN_API_KEY}

      # Service
      RELAY_PORT: 3001
    ports:
      - "3001:3001"
    networks:
      - genepay-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  # ---------------------------------------------------------------------------
  # Backend: Payment Service (Spring Boot / Java) — port 8080
  # ---------------------------------------------------------------------------
  payment-service:
    build:
      context: ../../../modules/genepay-payment-service
      dockerfile: Dockerfile
    container_name: genepay-payment-service
    restart: unless-stopped
    environment:
      # Database
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}

      # Server
      SERVER_PORT: 8080
      SPRING_ENV: ${SPRING_ENV:-production}

      # JWT
      JWT_SECRET: ${JWT_SECRET_KEY}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-604800000}

      # Mail
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}

      # Email Sender
      EMAIL_FROM: ${EMAIL_FROM:-noreply@genepay.com}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-GenePay}
      SUPPORT_EMAIL: ${SUPPORT_EMAIL:-support@genepay.com}

      # Inter-service URLs
      BIOMETRIC_SERVICE_URL: http://biometric-service:8001
      BLOCKCHAIN_RELAY_URL: http://blockchain-relay:3001
      BANKING_SERVICE_URL: ${BANKING_SERVICE_URL:-http://localhost:5000}

      # Banking / Platform
      BIOPAY_PLATFORM_TOKEN: ${BIOPAY_PLATFORM_TOKEN}
      BLOCKCHAIN_ENABLED: ${BLOCKCHAIN_ENABLED:-true}

      # Security
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:3002}
      MAX_LOGIN_ATTEMPTS: ${MAX_LOGIN_ATTEMPTS:-5}
      LOCKOUT_DURATION: ${LOCKOUT_DURATION:-900000}

      # Google OAuth2
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}

      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      biometric-service:
        condition: service_healthy
      blockchain-relay:
        condition: service_healthy
    networks:
      - genepay-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/v1/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 5

  # ---------------------------------------------------------------------------
  # Web: Admin Dashboard (React + Nginx) — port 3000
  # ---------------------------------------------------------------------------
  admin-dashboard:
    build:
      context: ../../../web/genepay-admin-dashboard
      dockerfile: Dockerfile
    container_name: genepay-admin-dashboard
    restart: unless-stopped
    environment:
      # Runtime env injection (via docker-entrypoint.sh + envsubst)
      VITE_API_BASE: ${ADMIN_VITE_API_BASE:-http://localhost:8080}
    ports:
      - "3000:80"
    depends_on:
      payment-service:
        condition: service_healthy
    networks:
      - genepay-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  # ---------------------------------------------------------------------------
  # Web: Blockchain Dashboard (React/TS + Nginx) — port 3002
  # ---------------------------------------------------------------------------
  blockchain-dashboard:
    build:
      context: ../../../web/genepay-blockchain-dashboard
      dockerfile: Dockerfile
    container_name: genepay-blockchain-dashboard
    restart: unless-stopped
    environment:
      # Runtime env injection (via docker-entrypoint.sh + envsubst)
      VITE_RPC_URL: ${SEPOLIA_RPC_URL}
      VITE_CONTRACT_ADDRESS: ${CONTRACT_ADDRESS}
    ports:
      - "3002:80"
    networks:
      - genepay-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_data:
    driver: local

# =============================================================================
# Networks
# =============================================================================
networks:
  genepay-network:
    driver: bridge
