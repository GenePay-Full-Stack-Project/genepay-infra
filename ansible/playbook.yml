---
- name: GenePay — K3s single-node cluster setup
  hosts: all
  become: true
  gather_facts: true

  pre_tasks:
    - name: Update all packages
      apt:
        upgrade: dist
        update_cache: true

    - name: Install common utilities
      apt:
        name:
          - jq
          - curl
          - git
          - unzip
        state: present

  roles:
    - role: docker
    - role: k3s
    - role: ingress
    - role: ecr
