---
- name: Fetch instance public IP from EC2 IMDS
  uri:
    url: http://169.254.169.254/latest/meta-data/public-ipv4
    return_content: true
  register: ec2_public_ip

- name: Set public IP fact
  set_fact:
    instance_public_ip: "{{ ec2_public_ip.content }}"

- name: Install K3s
  shell: |
    curl -sfL https://get.k3s.io | \
      INSTALL_K3S_VERSION="{{ k3s_version }}" \
      INSTALL_K3S_EXEC="server \
        --disable traefik \
        --write-kubeconfig-mode 644 \
        --tls-san {{ instance_public_ip }}" \
      sh -
  args:
    creates: /usr/local/bin/k3s   # idempotent — skips if K3s already installed

- name: Wait for K3s kubeconfig to appear
  wait_for:
    path: "{{ k3s_kubeconfig_path }}"
    state: present
    timeout: 120

- name: Wait for K3s node to become Ready
  shell: kubectl get nodes --kubeconfig {{ k3s_kubeconfig_path }}
  register: k3s_status
  retries: 12
  delay: 10
  until: "'Ready' in k3s_status.stdout"
  changed_when: false

- name: Create .kube directory for ubuntu user
  file:
    path: /home/ubuntu/.kube
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: "0700"

- name: Copy kubeconfig for ubuntu user
  copy:
    src: "{{ k3s_kubeconfig_path }}"
    dest: /home/ubuntu/.kube/config
    remote_src: true
    owner: ubuntu
    group: ubuntu
    mode: "0600"
