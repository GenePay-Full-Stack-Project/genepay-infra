---
- name: Update apt cache
  apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install Docker prerequisites
  apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present

- name: Add Docker GPG key
  shell: |
    install -m 0755 -d /etc/apt/keyrings
    curl -fsSL https://download.docker.com/linux/ubuntu/gpg \
      -o /etc/apt/keyrings/docker.asc
    chmod a+r /etc/apt/keyrings/docker.asc
  args:
    creates: /etc/apt/keyrings/docker.asc

- name: Add Docker apt repository
  shell: |
    echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] \
      https://download.docker.com/linux/ubuntu \
      $(. /etc/os-release && echo "$VERSION_CODENAME") stable" \
      > /etc/apt/sources.list.d/docker.list
  args:
    creates: /etc/apt/sources.list.d/docker.list

- name: Install Docker Engine
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Enable and start Docker
  systemd:
    name: docker
    state: started
    enabled: true

- name: Add ubuntu user to docker group
  user:
    name: ubuntu
    groups: docker
    append: true

- name: Install amazon-ecr-credential-helper
  apt:
    name: amazon-ecr-credential-helper
    state: present

- name: Create .docker config directories
  file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - /root/.docker
    - /home/ubuntu/.docker

- name: Write Docker ECR credential helper config (root)
  copy:
    dest: /root/.docker/config.json
    mode: "0600"
    content: |
      {
        "credHelpers": {
          "{{ aws_region }}.amazonaws.com": "ecr-login"
        }
      }

- name: Write Docker ECR credential helper config (ubuntu)
  copy:
    dest: /home/ubuntu/.docker/config.json
    owner: ubuntu
    group: ubuntu
    mode: "0600"
    content: |
      {
        "credHelpers": {
          "{{ aws_region }}.amazonaws.com": "ecr-login"
        }
      }
